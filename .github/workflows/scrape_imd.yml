name: IMD Multi Warning Scraper

on:
  # Schedule removed — triggered externally by Google Apps Script
  # via workflow_dispatch API for reliable IST-aligned timing.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run scraper
        run: |
          python scripts/scrape_imd.py
        env:
          IMD_STATE_ID: '10'
          PYTHONUNBUFFERED: '1'
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage all data files including PNGs
          git add data/

          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "data: IMD scrape ${TIMESTAMP}"
            git push
          fi

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imd-snapshots
          path: |
            data/*.html
            data/*.png
            data/*.csv
          retention-days: 3
          if-no-files-found: ignore
