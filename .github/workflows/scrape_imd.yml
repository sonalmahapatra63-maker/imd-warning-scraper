name: IMD Multi Warning Scraper

on:
  # Triggered by Supabase pg_cron → Edge Function → workflow_dispatch
  # for precise IST-aligned timing (seconds accuracy).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run scraper
        run: |
          python scripts/scrape_imd.py
        env:
          IMD_STATE_ID: '10'
          PYTHONUNBUFFERED: '1'
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Force-add PNGs (bypasses any gitignore, ensures new files are tracked)
          git add -f data/*.png
          git add data/

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # --allow-empty ensures PNGs are always committed even when pixel
          # content is unchanged (e.g. all-green map between two runs).
          git commit --allow-empty -m "data: IMD scrape ${TIMESTAMP}"
          git push

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imd-snapshots
          path: |
            data/*.html
            data/*.png
            data/*.csv
          retention-days: 3
          if-no-files-found: ignore
