name: IMD Multi Warning Scraper

on:
  schedule:
    # 15 min after each IMD update: 22:15, 01:15, 04:15, 07:15, 10:15, 13:15, 16:15, 19:15 IST
    # IST = UTC+5:30, so subtract 5h30m → UTC times: 16:45, 19:45, 22:45, 01:45, 04:45, 08:45, 10:45, 13:45
    - cron: '45 16 * * *'   # 22:15 IST
    - cron: '45 19 * * *'   # 01:15 IST (next day)
    - cron: '45 22 * * *'   # 04:15 IST
    - cron: '45 1  * * *'   # 07:15 IST
    - cron: '45 4  * * *'   # 10:15 IST
    - cron: '45 7  * * *'   # 13:15 IST
    - cron: '45 10 * * *'   # 16:15 IST
    - cron: '45 13 * * *'   # 19:15 IST

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run scraper
        run: |
          python scripts/scrape_imd.py
        env:
          IMD_STATE_ID: '10'
          PYTHONUNBUFFERED: '1'
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/

          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "data: IMD scrape ${TIMESTAMP}"
            git push
          fi

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imd-snapshots
          path: |
            data/*.html
            data/*.png
          retention-days: 3
          if-no-files-found: ignore
